services:
  dashboard:
    build: .
    container_name: server-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Persist DB in mounted volume
      USERS_DB_PATH: /app/data/users.db
      # Use writable cloudflared config path inside container
      CLOUDFLARED_FALLBACK_CONFIG_PATH: /app/cloudflared/config.yml
      APP_PORT: ${APP_PORT:-8000}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./cloudflared:/app/cloudflared
      # Optional: enable docker visibility/control from inside container
      # - /var/run/docker.sock:/var/run/docker.sock

