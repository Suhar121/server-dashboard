name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy-server-1:
    name: Deploy on Server 1
    runs-on: ubuntu-latest

    steps:
      - name: Check server 1 deploy configuration
        id: precheck
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_1 }}
          SSH_USER: ${{ secrets.SSH_USER_1 }}
          SSH_KEY: ${{ secrets.SSH_KEY_1 }}
        run: |
          set -euo pipefail
          if [[ -z "${SSH_HOST}" || -z "${SSH_USER}" || -z "${SSH_KEY}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping server 1 deploy: missing one or more required secrets (SSH_HOST_1, SSH_USER_1, SSH_KEY_1)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy app via SSH on server 1
        if: steps.precheck.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_1 }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST_1 }}
          username: ${{ secrets.SSH_USER_1 }}
          key: ${{ secrets.SSH_KEY_1 }}
          port: ${{ secrets.SSH_PORT_1 || '22' }}
          envs: DEPLOY_PATH,BRANCH
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            TARGET_PATH="${DEPLOY_PATH:-/home/user/test}"
            TARGET_BRANCH="${BRANCH:-main}"
            cd "$TARGET_PATH"

            git fetch origin "$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"

            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER='docker'
            elif sudo docker info >/dev/null 2>&1; then
              DOCKER='sudo docker'
            else
              echo 'ERROR: Docker daemon is not accessible for this user.'
              exit 1
            fi

            $DOCKER compose up -d --build --remove-orphans
            $DOCKER image prune -f >/dev/null 2>&1 || true

  deploy-server-2:
    name: Deploy on Server 2
    runs-on: ubuntu-latest

    steps:
      - name: Check server 2 deploy configuration
        id: precheck
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_2 }}
          SSH_USER: ${{ secrets.SSH_USER_2 }}
          SSH_KEY: ${{ secrets.SSH_KEY_2 }}
        run: |
          set -euo pipefail
          if [[ -z "${SSH_HOST}" || -z "${SSH_USER}" || -z "${SSH_KEY}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping server 2 deploy: missing one or more required secrets (SSH_HOST_2, SSH_USER_2, SSH_KEY_2)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy app via SSH on server 2
        if: steps.precheck.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_2 }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST_2 }}
          username: ${{ secrets.SSH_USER_2 }}
          key: ${{ secrets.SSH_KEY_2 }}
          port: ${{ secrets.SSH_PORT_2 || '22' }}
          envs: DEPLOY_PATH,BRANCH
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            TARGET_PATH="${DEPLOY_PATH:-/home/user/test}"
            TARGET_BRANCH="${BRANCH:-main}"
            cd "$TARGET_PATH"

            git fetch origin "$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"

            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER='docker'
            elif sudo docker info >/dev/null 2>&1; then
              DOCKER='sudo docker'
            else
              echo 'ERROR: Docker daemon is not accessible for this user.'
              exit 1
            fi

            $DOCKER compose up -d --build --remove-orphans
            $DOCKER image prune -f >/dev/null 2>&1 || true
