name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy-server-1:
    name: Deploy on Server 1
    runs-on:
      - self-hosted
      - linux
      - server-1

    steps:
      - name: Deploy app locally on server 1 runner
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_1 }}
        run: |
          set -euo pipefail
          TARGET_PATH="${DEPLOY_PATH:-/home/user/test}"
          cd "$TARGET_PATH"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

          if docker info >/dev/null 2>&1; then
            DOCKER='docker'
          elif sudo docker info >/dev/null 2>&1; then
            DOCKER='sudo docker'
          else
            echo 'ERROR: Docker daemon is not accessible for this user.'
            exit 1
          fi

          $DOCKER compose up -d --build --remove-orphans
          $DOCKER image prune -f >/dev/null 2>&1 || true

  deploy-server-2:
    name: Deploy on Server 2
    runs-on:
      - self-hosted
      - linux
      - server-2

    steps:
      - name: Deploy app locally on server 2 runner
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_2 }}
        run: |
          set -euo pipefail
          TARGET_PATH="${DEPLOY_PATH:-/home/user/test}"
          cd "$TARGET_PATH"

          git fetch origin main
          git checkout main
          git reset --hard origin/main

          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi

          if docker info >/dev/null 2>&1; then
            DOCKER='docker'
          elif sudo docker info >/dev/null 2>&1; then
            DOCKER='sudo docker'
          else
            echo 'ERROR: Docker daemon is not accessible for this user.'
            exit 1
          fi

          $DOCKER compose up -d --build --remove-orphans
          $DOCKER image prune -f >/dev/null 2>&1 || true
