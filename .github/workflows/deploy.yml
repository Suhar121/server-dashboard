name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy-server-1:
    name: Deploy on Server 1
    runs-on: ubuntu-latest
    if: ${{ secrets.SSH_HOST_1 != '' && secrets.SSH_USER_1 != '' && secrets.SSH_KEY_1 != '' }}

    steps:
      - name: Deploy app via SSH on server 1
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_1 }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST_1 }}
          username: ${{ secrets.SSH_USER_1 }}
          key: ${{ secrets.SSH_KEY_1 }}
          port: ${{ secrets.SSH_PORT_1 || '22' }}
          envs: DEPLOY_PATH,BRANCH
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            TARGET_PATH="${DEPLOY_PATH:-/home/user/test}"
            TARGET_BRANCH="${BRANCH:-main}"
            cd "$TARGET_PATH"

            git fetch origin "$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"

            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER='docker'
            elif sudo docker info >/dev/null 2>&1; then
              DOCKER='sudo docker'
            else
              echo 'ERROR: Docker daemon is not accessible for this user.'
              exit 1
            fi

            $DOCKER compose up -d --build --remove-orphans
            $DOCKER image prune -f >/dev/null 2>&1 || true

  deploy-server-2:
    name: Deploy on Server 2
    runs-on: ubuntu-latest
    if: ${{ secrets.SSH_HOST_2 != '' && secrets.SSH_USER_2 != '' && secrets.SSH_KEY_2 != '' }}

    steps:
      - name: Deploy app via SSH on server 2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH_2 }}
          BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SSH_HOST_2 }}
          username: ${{ secrets.SSH_USER_2 }}
          key: ${{ secrets.SSH_KEY_2 }}
          port: ${{ secrets.SSH_PORT_2 || '22' }}
          envs: DEPLOY_PATH,BRANCH
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            TARGET_PATH="${DEPLOY_PATH:-/home/user/test}"
            TARGET_BRANCH="${BRANCH:-main}"
            cd "$TARGET_PATH"

            git fetch origin "$TARGET_BRANCH"
            git checkout "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"

            if [ ! -f .env ] && [ -f .env.example ]; then
              cp .env.example .env
            fi

            if docker info >/dev/null 2>&1; then
              DOCKER='docker'
            elif sudo docker info >/dev/null 2>&1; then
              DOCKER='sudo docker'
            else
              echo 'ERROR: Docker daemon is not accessible for this user.'
              exit 1
            fi

            $DOCKER compose up -d --build --remove-orphans
            $DOCKER image prune -f >/dev/null 2>&1 || true
